name: CI/CD Pipeline - Docker Build and Push

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        # PR(Pull Request) 테스트 시에는 Push를 하지 않으므로 로그인 생략
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          # Pull Request일 경우 빌드 테스트만 수행하고, Main 브랜치 Push일 경우에만 Docker Hub에 업로드
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/mlops-sentiment-api:latest
          # 빌드 시간 단축을 위한 Docker 레이어 캐싱 설정
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/mlops-sentiment-api:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/mlops-sentiment-api:buildcache,mode=max

  deploy-to-local:
    needs: build-and-push
    if: github.event_name != 'pull_request'
    runs-on: self-hosted
    
    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull the latest image
        run: docker pull ${{ secrets.DOCKERHUB_USERNAME }}/mlops-sentiment-api:latest

      - name: Stop and remove old container
        run: |
          docker stop mlops-sentiment-api || true
          docker rm mlops-sentiment-api || true

      - name: Run new container
        run: |
          docker run -d \
            --name mlops-sentiment-api \
            -p 8000:8000 \
            --restart unless-stopped \
            ${{ secrets.DOCKERHUB_USERNAME }}/mlops-sentiment-api:latest
